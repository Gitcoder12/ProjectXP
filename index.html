<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProjectXP — Dev Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --bg2:      #0e0e1a;
  --bg3:      #14141f;
  --surface:  #1a1a28;
  --border:   #252538;
  --border2:  #32324a;
  --green:    #00ff88;
  --green2:   #00cc6a;
  --yellow:   #ffd60a;
  --orange:   #ff6b35;
  --red:      #ff3355;
  --blue:     #4488ff;
  --purple:   #9966ff;
  --text:     #eeeef5;
  --text2:    #8888aa;
  --text3:    #44445a;
  --mono:     'Space Mono', monospace;
  --display:  'Syne', sans-serif;
  --body:     'DM Sans', sans-serif;
  --radius:   10px;
  --glow-g:   0 0 20px rgba(0,255,136,0.2);
  --glow-y:   0 0 20px rgba(255,214,10,0.2);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
  font-size:15px; line-height:1.6;
}

/* Scanline effect */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}

/* ── HEADER ── */
header{
  display:flex; align-items:center; justify-content:space-between;
  padding:1.25rem 2rem;
  background:rgba(8,8,16,0.9); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo{
  font-family:var(--display); font-size:1.4rem; font-weight:800;
  letter-spacing:-0.5px; color:var(--text);
  display:flex; align-items:center; gap:0.5rem;
}
.logo-xp{color:var(--green)}
.logo-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--green);
  box-shadow:var(--glow-g);
  animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.header-right{display:flex;align-items:center;gap:0.75rem}
.btn{
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.45rem 1rem; border-radius:var(--radius);
  font-family:var(--mono); font-size:0.72rem; font-weight:700;
  letter-spacing:0.5px; cursor:pointer; border:none;
  transition:all var(--transition); text-decoration:none;
}
.btn-green{background:var(--green);color:#000;box-shadow:var(--glow-g)}
.btn-green:hover{background:var(--green2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,51,85,0.3)}
.btn-danger:hover{background:rgba(255,51,85,0.1)}
.btn-sm{padding:0.3rem 0.7rem;font-size:0.65rem}

/* ── STATS BAR ── */
.stats-bar{
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:0; border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.stat-cell{
  padding:1rem 1.5rem; border-right:1px solid var(--border);
  position:relative; overflow:hidden;
}
.stat-cell:last-child{border-right:none}
.stat-cell::before{
  content:''; position:absolute; bottom:0; left:0;
  height:2px; width:var(--fill,0%);
  background:var(--color,var(--green));
  transition:width 1s ease;
}
.stat-label{font-family:var(--mono);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:0.3rem}
.stat-value{font-family:var(--display);font-size:1.6rem;font-weight:800;color:var(--text);line-height:1}
.stat-value span{font-size:0.75rem;font-weight:400;color:var(--text2);margin-left:2px}
.stat-sub{font-size:0.72rem;color:var(--text3);margin-top:0.2rem;font-family:var(--mono)}

/* ── MAIN LAYOUT ── */
.main{max-width:1400px;margin:0 auto;padding:1.5rem 2rem}

/* ── TOOLBAR ── */
.toolbar{
  display:flex; align-items:center; gap:0.75rem;
  margin-bottom:1.5rem; flex-wrap:wrap;
}
.search-wrap{
  display:flex; align-items:center; gap:0.5rem;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:0.4rem 0.9rem;
  flex:1; min-width:200px; max-width:340px;
  transition:border-color var(--transition);
}
.search-wrap:focus-within{border-color:var(--green)}
.search-wrap input{
  background:none; border:none; outline:none;
  color:var(--text); font-family:var(--mono); font-size:0.8rem; width:100%;
}
.search-wrap input::placeholder{color:var(--text3)}
.filter-tabs{display:flex;gap:0}
.ftab{
  padding:0.4rem 0.9rem; font-family:var(--mono); font-size:0.68rem;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text3); transition:all var(--transition);
  margin-left:-1px;
}
.ftab:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.ftab:last-child{border-radius:0 var(--radius) var(--radius) 0}
.ftab:hover{color:var(--text)}
.ftab.on{background:var(--green);color:#000;border-color:var(--green);z-index:1}
.sort-select{
  background:var(--surface); border:1px solid var(--border);
  color:var(--text2); font-family:var(--mono); font-size:0.72rem;
  padding:0.4rem 0.7rem; border-radius:var(--radius); outline:none; cursor:pointer;
  transition:border-color var(--transition);
}
.sort-select:focus{border-color:var(--green)}
.view-btns{display:flex;gap:0}
.vbtn{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text3);cursor:pointer;font-size:0.9rem;
  transition:all var(--transition); margin-left:-1px;
}
.vbtn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.vbtn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.vbtn.on,.vbtn:hover{background:var(--border2);color:var(--green)}

/* ── PROJECT GRID ── */
#projects-container.grid-view{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1rem;
}
#projects-container.list-view{
  display:flex; flex-direction:column; gap:0.6rem;
}

/* ── PROJECT CARD ── */
.project-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.25rem;
  transition:all var(--transition); position:relative;
  overflow:hidden; cursor:pointer;
}
.project-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--card-color,var(--green));
  transform:scaleX(var(--progress-fill,0));
  transform-origin:left; transition:transform 1s ease;
}
.project-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}

/* List view card */
#projects-container.list-view .project-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:1rem; align-items:center;
  padding:0.9rem 1.25rem;
}
#projects-container.list-view .card-bottom{display:none}
#projects-container.list-view .card-top{display:flex;align-items:center;gap:1rem}
#projects-container.list-view .card-meta-row{display:flex;align-items:center;gap:0.75rem}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem}
.card-title-wrap{}
.card-title{
  font-family:var(--display); font-size:1.05rem; font-weight:700;
  color:var(--text); margin-bottom:0.2rem;
}
.card-desc{font-size:0.82rem;color:var(--text2);line-height:1.5;margin-bottom:0.85rem}
.card-actions{display:flex;gap:0.4rem;opacity:0;transition:opacity var(--transition)}
.project-card:hover .card-actions{opacity:1}

/* Status badge */
.status-badge{
  display:inline-flex; align-items:center; gap:0.3rem;
  padding:3px 8px; border-radius:4px;
  font-family:var(--mono); font-size:0.6rem; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; flex-shrink:0;
}
.s-active{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
.s-building{background:rgba(255,214,10,0.12);color:var(--yellow);border:1px solid rgba(255,214,10,0.25)}
.s-paused{background:rgba(136,136,170,0.12);color:var(--text2);border:1px solid var(--border2)}
.s-complete{background:rgba(68,136,255,0.12);color:var(--blue);border:1px solid rgba(68,136,255,0.25)}
.s-broken{background:rgba(255,51,85,0.12);color:var(--red);border:1px solid rgba(255,51,85,0.25)}

/* Progress */
.progress-section{margin-bottom:0.85rem}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem}
.progress-label{font-family:var(--mono);font-size:0.62rem;color:var(--text3);letter-spacing:1px}
.progress-pct{font-family:var(--mono);font-size:0.72rem;font-weight:700}
.progress-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-bar{
  height:100%; border-radius:3px;
  background:var(--card-color,var(--green));
  transition:width 1s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 0 8px var(--card-color,var(--green));
}

/* Features */
.features-wrap{display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.85rem}
.feature-tag{
  display:inline-flex; align-items:center; gap:0.25rem;
  padding:2px 8px; border-radius:3px;
  font-family:var(--mono); font-size:0.6rem;
  border:1px solid var(--border2); color:var(--text3);
  transition:all var(--transition);
}
.feature-tag.done{color:var(--green);border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.06)}
.feature-tag.wip{color:var(--yellow);border-color:rgba(255,214,10,0.3);background:rgba(255,214,10,0.06)}
.feature-tag.todo{color:var(--text3)}

/* Card bottom */
.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
.card-tech{display:flex;gap:0.35rem;flex-wrap:wrap}
.tech-pill{
  padding:2px 7px; border-radius:3px;
  font-family:var(--mono); font-size:0.58rem;
  background:var(--bg3); color:var(--text3); border:1px solid var(--border);
}
.card-date{font-family:var(--mono);font-size:0.6rem;color:var(--text3)}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:900; display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-backdrop.open{display:flex}
.modal{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; width:min(640px,92vw);
  max-height:88vh; overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,0.8);
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
  display:flex; justify-content:space-between; align-items:center;
  padding:1.5rem 1.5rem 0;
}
.modal-title{font-family:var(--display);font-size:1.2rem;font-weight:800}
.modal-close{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:1.5rem}

/* Form */
.form-group{margin-bottom:1.1rem}
.form-label{font-family:var(--mono);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:0.4rem}
.form-input,.form-textarea,.form-select{
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-family:var(--body); font-size:0.9rem;
  padding:0.55rem 0.8rem; border-radius:var(--radius); outline:none;
  transition:border-color var(--transition);
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--green)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-select{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.form-hint{font-family:var(--mono);font-size:0.6rem;color:var(--text3);margin-top:0.3rem}

/* Feature editor */
.features-editor{display:flex;flex-direction:column;gap:0.4rem;margin-top:0.4rem}
.feature-row{display:flex;gap:0.4rem;align-items:center}
.feature-row input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:0.75rem;padding:0.3rem 0.6rem;border-radius:4px;outline:none}
.feature-row input:focus{border-color:var(--green)}
.feature-row select{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:0.68rem;padding:0.3rem 0.4rem;border-radius:4px;outline:none;cursor:pointer}
.feature-row .rm-btn{width:26px;height:26px;border-radius:4px;background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75rem;transition:all var(--transition);flex-shrink:0}
.feature-row .rm-btn:hover{border-color:var(--red);color:var(--red)}
.add-feat-btn{font-family:var(--mono);font-size:0.68rem;color:var(--green);background:transparent;border:1px dashed rgba(0,255,136,0.3);border-radius:4px;padding:0.3rem 0.7rem;cursor:pointer;transition:all var(--transition);width:100%;margin-top:0.25rem}
.add-feat-btn:hover{background:rgba(0,255,136,0.06)}

/* Tech input */
.tech-input-wrap{display:flex;gap:0.4rem}
.tech-input-wrap input{flex:1}
#tech-tags{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.4rem}
.tech-tag-edit{
  display:inline-flex;align-items:center;gap:0.3rem;
  padding:2px 8px;border-radius:3px;
  font-family:var(--mono);font-size:0.65rem;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
}
.tech-tag-edit button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.8rem;padding:0;line-height:1}
.tech-tag-edit button:hover{color:var(--red)}

/* Color picker */
.color-options{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.4rem}
.color-opt{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid transparent; transition:all var(--transition);
  position:relative;
}
.color-opt.selected{border-color:white;transform:scale(1.15)}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center; padding:5rem 2rem;
  font-family:var(--mono); color:var(--text3);
}
.empty-state .big{font-size:3rem;margin-bottom:1rem;display:block}
.empty-state p{font-size:0.8rem;letter-spacing:1px;margin-bottom:1.5rem}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:0.75rem;
  padding:0.6rem 1rem;border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  transform:translateY(60px);opacity:0;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index:9998;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ── PROGRESS RING (hero) ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-text{position:absolute;font-family:var(--display);font-size:1.1rem;font-weight:800;color:var(--green)}

/* ── DETAIL PANEL ── */
.detail-modal .modal{width:min(760px,95vw)}
.detail-section{margin-bottom:1.5rem}
.detail-section-title{font-family:var(--mono);font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)}
.detail-features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem}
.detail-feat{
  padding:0.5rem 0.75rem;border-radius:6px;
  display:flex;align-items:center;gap:0.5rem;
  background:var(--bg3);border:1px solid var(--border);
  font-size:0.82rem;
}
.feat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.feat-dot.done{background:var(--green);box-shadow:0 0 6px var(--green)}
.feat-dot.wip{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.feat-dot.todo{background:var(--text3)}

@media(max-width:768px){
  .stats-bar{grid-template-columns:repeat(3,1fr)}
  .stat-cell:nth-child(4),.stat-cell:nth-child(5){border-top:1px solid var(--border)}
  header{padding:1rem}
  .main{padding:1rem}
  #projects-container.grid-view{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Project<span class="logo-xp">XP</span>
  </div>
  <div class="header-right">
    <span style="font-family:var(--mono);font-size:0.65rem;color:var(--text3);letter-spacing:1px" id="project-count-label">0 PROJECTS</span>
    <button class="btn btn-outline btn-sm" onclick="exportData()">⬇ EXPORT</button>
    <button class="btn btn-green" onclick="openAddModal()">+ ADD PROJECT</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-cell" style="--color:var(--green)">
    <div class="stat-label">Total Projects</div>
    <div class="stat-value" id="s-total">0</div>
    <div class="stat-sub" id="s-total-sub">across all types</div>
  </div>
  <div class="stat-cell" style="--color:var(--green)">
    <div class="stat-label">Avg Completion</div>
    <div class="stat-value" id="s-avg">0<span>%</span></div>
    <div class="stat-sub" id="s-avg-sub">overall progress</div>
  </div>
  <div class="stat-cell" style="--color:var(--blue)">
    <div class="stat-label">Complete</div>
    <div class="stat-value" id="s-complete">0</div>
    <div class="stat-sub" id="s-complete-sub">shipped 🚀</div>
  </div>
  <div class="stat-cell" style="--color:var(--yellow)">
    <div class="stat-label">In Progress</div>
    <div class="stat-value" id="s-active">0</div>
    <div class="stat-sub" id="s-active-sub">building now</div>
  </div>
  <div class="stat-cell" style="--color:var(--orange)">
    <div class="stat-label">Features Done</div>
    <div class="stat-value" id="s-feats">0<span id="s-feats-total"></span></div>
    <div class="stat-sub" id="s-feats-sub">implemented</div>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search projects...">
    </div>
    <div class="filter-tabs">
      <button class="ftab on" data-filter="all">ALL</button>
      <button class="ftab" data-filter="active">ACTIVE</button>
      <button class="ftab" data-filter="building">BUILDING</button>
      <button class="ftab" data-filter="complete">DONE</button>
      <button class="ftab" data-filter="paused">PAUSED</button>
      <button class="ftab" data-filter="broken">BROKEN</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="updated">Recent</option>
      <option value="progress-d">Progress ↓</option>
      <option value="progress-a">Progress ↑</option>
      <option value="name">Name A–Z</option>
      <option value="features">Most Features</option>
    </select>
    <div class="view-btns">
      <button class="vbtn on" id="vbtn-grid" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="vbtn" id="vbtn-list" onclick="setView('list')" title="List">☰</button>
    </div>
  </div>

  <!-- Projects -->
  <div id="projects-container" class="grid-view"></div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="add-modal" onclick="e=>e.target===this&&closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">New Project</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Project Name *</label>
          <input class="form-input" id="f-name" placeholder="e.g. LoreZone">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option value="building">🔨 Building</option>
            <option value="active">✅ Active</option>
            <option value="complete">🚀 Complete</option>
            <option value="paused">⏸ Paused</option>
            <option value="broken">🔴 Broken</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="f-desc" placeholder="What does this project do?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Progress %</label>
          <input class="form-input" id="f-progress" type="number" min="0" max="100" placeholder="0–100">
        </div>
        <div class="form-group">
          <label class="form-label">GitHub URL</label>
          <input class="form-input" id="f-github" placeholder="github.com/user/repo">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Live URL</label>
        <input class="form-input" id="f-live" placeholder="username.github.io/project">
      </div>
      <div class="form-group">
        <label class="form-label">Features</label>
        <div class="features-editor" id="features-editor"></div>
        <button class="add-feat-btn" onclick="addFeatureRow()">+ Add Feature</button>
        <div class="form-hint">Mark each feature as: done ✓ / wip ~ / todo ○</div>
      </div>
      <div class="form-group">
        <label class="form-label">Tech Stack</label>
        <div class="tech-input-wrap">
          <input class="form-input" id="tech-input" placeholder="e.g. React" onkeydown="if(event.key==='Enter'){event.preventDefault();addTech()}">
          <button class="btn btn-outline btn-sm" onclick="addTech()">ADD</button>
        </div>
        <div id="tech-tags"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Accent Color</label>
        <div class="color-options" id="color-options"></div>
      </div>
      <div style="display:flex;gap:0.6rem;justify-content:flex-end;margin-top:1.5rem">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-green" onclick="saveProject()" id="save-btn">SAVE PROJECT</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop detail-modal" id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────
const COLORS = [
  {name:'green',  val:'#00ff88'},
  {name:'yellow', val:'#ffd60a'},
  {name:'orange', val:'#ff6b35'},
  {name:'red',    val:'#ff3355'},
  {name:'blue',   val:'#4488ff'},
  {name:'purple', val:'#9966ff'},
  {name:'teal',   val:'#00d4aa'},
  {name:'pink',   val:'#ff66aa'},
];

let projects = [];
let editingId = null;
let currentFilter = 'all';
let currentView = 'grid';
let tempTech = [];
let selectedColor = '#00ff88';

// ── STORAGE ─────────────────────────────────────────────────
function load() {
  try { projects = JSON.parse(localStorage.getItem('pxp_projects') || '[]'); }
  catch { projects = []; }
  // Seed demo data if empty
  if (!projects.length) seedDemo();
}
function save() {
  localStorage.setItem('pxp_projects', JSON.stringify(projects));
}

    },

    },

// ── UTILITIES ────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function timeAgo(ts) {
  const d = Date.now() - ts;
  if(d < 60000) return 'just now';
  if(d < 3600000) return Math.floor(d/60000) + 'm ago';
  if(d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

// ── STATS ────────────────────────────────────────────────────
function updateStats() {
  const total = projects.length;
  const avg = total ? Math.round(projects.reduce((s,p)=>s+p.progress,0)/total) : 0;
  const complete = projects.filter(p=>p.status==='complete').length;
  const active = projects.filter(p=>p.status==='active'||p.status==='building').length;
  const allFeats = projects.flatMap(p=>p.features||[]);
  const doneFeats = allFeats.filter(f=>f.status==='done').length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-avg').innerHTML = avg + '<span>%</span>';
  document.getElementById('s-complete').textContent = complete;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-feats').innerHTML = doneFeats + `<span style="color:var(--text3);font-size:0.7rem">/${allFeats.length}</span>`;
  document.getElementById('project-count-label').textContent = total + ' PROJECT' + (total!==1?'S':'');

  // Fill bars
  document.querySelectorAll('.stat-cell').forEach((el,i) => {
    const fills = [
      Math.min(100, total*5),
      avg,
      total ? complete/total*100 : 0,
      total ? active/total*100 : 0,
      allFeats.length ? doneFeats/allFeats.length*100 : 0
    ];
    el.style.setProperty('--fill', fills[i]+'%');
  });
}

// ── RENDER ───────────────────────────────────────────────────
function render() {
  updateStats();
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = projects.filter(p => {
    const matchF = currentFilter==='all' || p.status===currentFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q) || (p.tech||[]).some(t=>t.toLowerCase().includes(q));
    return matchF && matchQ;
  });

  filtered.sort((a,b) => {
    if(sort==='updated')    return b.updated - a.updated;
    if(sort==='progress-d') return b.progress - a.progress;
    if(sort==='progress-a') return a.progress - b.progress;
    if(sort==='name')       return a.name.localeCompare(b.name);
    if(sort==='features')   return (b.features||[]).length - (a.features||[]).length;
    return 0;
  });

  const container = document.getElementById('projects-container');
  if(!filtered.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">📭</span><p>// NO PROJECTS FOUND</p><button class="btn btn-green" onclick="openAddModal()">+ ADD YOUR FIRST PROJECT</button></div>`;
    return;
  }

  container.innerHTML = filtered.map(buildCard).join('');

  // Animate progress bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.project-card').forEach(card => {
      const pct = card.dataset.progress;
      card.style.setProperty('--progress-fill', pct/100);
      const bar = card.querySelector('.progress-bar');
      if(bar) { bar.style.width = '0'; requestAnimationFrame(()=>{ bar.style.width=pct+'%'; }); }
    });
  });
}

function buildCard(p) {
  const feats = p.features || [];
  const done  = feats.filter(f=>f.status==='done').length;
  const wip   = feats.filter(f=>f.status==='wip').length;
  const statusMap = {
    active:   ['s-active','✅ Active'],
    building: ['s-building','🔨 Building'],
    paused:   ['s-paused','⏸ Paused'],
    complete: ['s-complete','🚀 Complete'],
    broken:   ['s-broken','🔴 Broken'],
  };
  const [sc, sl] = statusMap[p.status] || ['s-paused','Unknown'];

  return `<div class="project-card" data-id="${p.id}" data-progress="${p.progress}"
    style="--card-color:${p.color||'#00ff88'}"
    onclick="openDetail('${p.id}')">
    <div class="card-header">
      <div class="card-title-wrap">
        <div class="card-title">${p.name}</div>
      </div>
      <div style="display:flex;gap:0.4rem;align-items:center">
        <span class="status-badge ${sc}">${sl}</span>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-sm" onclick="openEdit('${p.id}')">✎</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="card-desc">${p.desc||'No description.'}</div>
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">COMPLETION</span>
        <span class="progress-pct" style="color:${p.color||'#00ff88'}">${p.progress}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" style="background:${p.color||'#00ff88'};box-shadow:0 0 8px ${p.color||'#00ff88'};width:0%"></div>
      </div>
    </div>
    ${feats.length ? `
    <div class="features-wrap">
      ${feats.slice(0,6).map(f=>`
        <span class="feature-tag ${f.status}">
          ${f.status==='done'?'✓':f.status==='wip'?'~':'○'} ${f.name}
        </span>`).join('')}
      ${feats.length>6?`<span class="feature-tag">+${feats.length-6} more</span>`:''}
    </div>` : ''}
    <div class="card-bottom">
      <div class="card-tech">
        ${(p.tech||[]).map(t=>`<span class="tech-pill">${t}</span>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem">
        <div class="card-date">${timeAgo(p.updated)}</div>
        ${feats.length?`<div style="font-family:var(--mono);font-size:0.58rem;color:var(--text3)">${done}/${feats.length} feats</div>`:''}
      </div>
    </div>
  </div>`;
}

// ── DETAIL ───────────────────────────────────────────────────
function openDetail(id) {
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  const feats = p.features || [];
  const done = feats.filter(f=>f.status==='done').length;
  const wip  = feats.filter(f=>f.status==='wip').length;
  const todo = feats.filter(f=>f.status==='todo').length;

  document.getElementById('detail-content').innerHTML = `
    <div class="modal-header" style="border-bottom:1px solid var(--border);padding-bottom:1rem">
      <div>
        <div style="font-family:var(--display);font-size:1.4rem;font-weight:800">${p.name}</div>
        <div style="font-family:var(--mono);font-size:0.65rem;color:var(--text3);margin-top:0.2rem">${p.tech?.join(' · ')||''}</div>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="closeDetail();openEdit('${p.id}')">✎ EDIT</button>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="detail-section">
        <div style="font-size:0.95rem;color:var(--text2);line-height:1.7;margin-bottom:1rem">${p.desc||''}</div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          ${p.github?`<a href="https://${p.github}" target="_blank" class="btn btn-outline btn-sm">⌥ GITHUB</a>`:''}
          ${p.live?`<a href="https://${p.live}" target="_blank" class="btn btn-green btn-sm">↗ LIVE SITE</a>`:''}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">// PROGRESS</div>
        <div style="display:flex;align-items:center;gap:1.5rem">
          <div style="font-family:var(--display);font-size:3rem;font-weight:800;color:${p.color||'#00ff88'}">${p.progress}%</div>
          <div style="flex:1">
            <div class="progress-track" style="height:8px">
              <div class="progress-bar" style="width:${p.progress}%;background:${p.color||'#00ff88'};box-shadow:0 0 12px ${p.color||'#00ff88'}"></div>
            </div>
            <div style="font-family:var(--mono);font-size:0.65rem;color:var(--text3);margin-top:0.5rem">
              ${done} done · ${wip} in progress · ${todo} todo
            </div>
          </div>
        </div>
      </div>

      ${feats.length?`
      <div class="detail-section">
        <div class="detail-section-title">// FEATURES (${feats.length})</div>
        <div class="detail-features-grid">
          ${feats.map(f=>`
            <div class="detail-feat">
              <div class="feat-dot ${f.status}"></div>
              <span style="color:${f.status==='done'?'var(--text)':f.status==='wip'?'var(--yellow)':'var(--text3)'}">${f.name}</span>
            </div>`).join('')}
        </div>
      </div>`:''}

      <div style="display:flex;justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-danger btn-sm" onclick="closeDetail();deleteProject('${p.id}')">✕ DELETE PROJECT</button>
      </div>
    </div>`;
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }

// ── ADD / EDIT ───────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  tempTech = [];
  selectedColor = '#00ff88';
  document.getElementById('modal-title-text').textContent = 'New Project';
  document.getElementById('save-btn').textContent = 'SAVE PROJECT';
  clearForm();
  renderColorOptions();
  document.getElementById('add-modal').classList.add('open');
}
function openEdit(id) {
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  tempTech = [...(p.tech||[])];
  selectedColor = p.color||'#00ff88';
  document.getElementById('modal-title-text').textContent = 'Edit Project';
  document.getElementById('save-btn').textContent = 'UPDATE PROJECT';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-status').value = p.status||'building';
  document.getElementById('f-desc').value = p.desc||'';
  document.getElementById('f-progress').value = p.progress||0;
  document.getElementById('f-github').value = p.github||'';
  document.getElementById('f-live').value = p.live||'';
  renderFeatureEditor(p.features||[]);
  renderTechTags();
  renderColorOptions();
  document.getElementById('add-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
  editingId = null;
}
function clearForm() {
  ['f-name','f-desc','f-github','f-live'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='building';
  document.getElementById('f-progress').value=0;
  document.getElementById('features-editor').innerHTML='';
  renderTechTags();
}

function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { toast('⚠ Project name required'); return; }

  const feats = [];
  document.querySelectorAll('.feature-row').forEach(row => {
    const inp = row.querySelector('input');
    const sel = row.querySelector('select');
    if(inp?.value.trim()) feats.push({ name: inp.value.trim(), status: sel?.value||'todo' });
  });

  const data = {
    name,
    status:   document.getElementById('f-status').value,
    desc:     document.getElementById('f-desc').value.trim(),
    progress: Math.min(100,Math.max(0,parseInt(document.getElementById('f-progress').value)||0)),
    github:   document.getElementById('f-github').value.trim(),
    live:     document.getElementById('f-live').value.trim(),
    tech:     [...tempTech],
    features: feats,
    color:    selectedColor,
    updated:  Date.now(),
  };

  if(editingId) {
    const i = projects.findIndex(p=>p.id===editingId);
    if(i>=0) projects[i] = { ...projects[i], ...data };
    toast('✓ Project updated');
  } else {
    projects.unshift({ id: uid(), ...data });
    toast('✓ Project added');
  }
  save(); closeModal(); render();
}

function deleteProject(id) {
  if(!confirm('Delete this project?')) return;
  projects = projects.filter(p=>p.id!==id);
  save(); render(); toast('Project deleted');
}

// Feature editor
function renderFeatureEditor(feats=[]) {
  const ed = document.getElementById('features-editor');
  ed.innerHTML = feats.map((f,i)=>`
    <div class="feature-row">
      <input value="${f.name}" placeholder="Feature name">
      <select>
        <option value="todo" ${f.status==='todo'?'selected':''}>○ Todo</option>
        <option value="wip"  ${f.status==='wip' ?'selected':''}>~ WIP</option>
        <option value="done" ${f.status==='done'?'selected':''}>✓ Done</option>
      </select>
      <button class="rm-btn" onclick="this.closest('.feature-row').remove()">✕</button>
    </div>`).join('');
}
function addFeatureRow() {
  const ed = document.getElementById('features-editor');
  const row = document.createElement('div');
  row.className = 'feature-row';
  row.innerHTML = `<input placeholder="Feature name"><select><option value="todo">○ Todo</option><option value="wip">~ WIP</option><option value="done">✓ Done</option></select><button class="rm-btn" onclick="this.closest('.feature-row').remove()">✕</button>`;
  ed.appendChild(row);
  row.querySelector('input').focus();
}

// Tech tags
function addTech() {
  const inp = document.getElementById('tech-input');
  const val = inp.value.trim();
  if(val && !tempTech.includes(val)) { tempTech.push(val); renderTechTags(); }
  inp.value = '';
}
function removeTech(t) { tempTech = tempTech.filter(x=>x!==t); renderTechTags(); }
function renderTechTags() {
  document.getElementById('tech-tags').innerHTML = tempTech.map(t=>
    `<span class="tech-tag-edit">${t}<button onclick="removeTech('${t}')">✕</button></span>`
  ).join('');
}

// Color options
function renderColorOptions() {
  document.getElementById('color-options').innerHTML = COLORS.map(c=>
    `<div class="color-opt ${c.val===selectedColor?'selected':''}"
      style="background:${c.val};box-shadow:0 0 8px ${c.val}40"
      onclick="pickColor('${c.val}')"></div>`
  ).join('');
}
function pickColor(val) { selectedColor=val; renderColorOptions(); }

// ── FILTERS / VIEW ───────────────────────────────────────────
document.querySelectorAll('.ftab').forEach(btn => {
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    currentFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById('search-input').addEventListener('input', render);
document.getElementById('sort-select').addEventListener('change', render);

function setView(v) {
  currentView = v;
  document.getElementById('projects-container').className = v+'-view';
  document.getElementById('vbtn-grid').classList.toggle('on', v==='grid');
  document.getElementById('vbtn-list').classList.toggle('on', v==='list');
}

// ── EXPORT ───────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(projects, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'projectxp-export.json';
  a.click();
  toast('📦 Exported projectxp-export.json');
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { closeModal(); closeDetail(); }
  if(e.key==='n' && !e.target.matches('input,textarea,select')) openAddModal();
});

// ── INIT ─────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
